# Grafana dashboard provisioning -- auto-loads dashboards from disk
apiVersion: 1

providers:
  - name: "GenAI Dashboards"
    orgId: 1
    folder: ""
    type: file
    disableDeletion: false
    editable: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
